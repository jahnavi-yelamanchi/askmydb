services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: askmydb
      POSTGRES_PASSWORD: askmydb
      POSTGRES_DB: askmydb
    volumes:
      - ./demo_db/seed.sql:/docker-entrypoint-initdb.d/seed.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U askmydb"]
      interval: 5s
      retries: 5

  backend:
    build: ./backend
    environment:
      DATABASE_URL: postgresql://askmydb:askmydb@db:5432/askmydb
      OPENAI_API_KEY: ${OPENAI_API_KEY}
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: ./frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
